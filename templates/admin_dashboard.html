<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>لوحة تحكم AYA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; margin:0; padding:0; }
        :root { --violet:#8b5cf6; --cyan:#22d3ee; --pink:#f472b6; }
        body { background:radial-gradient(ellipse at 50% 50%, #131a2c 0%, #0b0f19 100%); min-height:100vh; color:#e0e0e0; }
        .admin-nav { background:rgba(10,10,22,0.9); backdrop-filter:blur(20px); border-bottom:1px solid rgba(139,92,246,0.4); padding:0.8rem 0; }
        .sidebar { background:rgba(10,10,22,0.9); backdrop-filter:blur(20px); border-left:1px solid rgba(139,92,246,0.3); min-height:calc(100vh - 70px); padding:1.5rem 1rem; }
        .sidebar a { color:#ccc; font-weight:600; padding:10px 15px; margin-bottom:8px; border-radius:10px; transition:0.2s; border:1px solid rgba(139,92,246,0.3); display:flex; align-items:center; gap:10px; text-decoration:none; cursor:pointer; }
        .sidebar a:hover, .sidebar a.active { background:rgba(139,92,246,0.2); color:white; border-color:var(--cyan); box-shadow:0 0 15px rgba(34,211,238,0.3); }
        .glass-card { background:rgba(20,20,35,0.6); backdrop-filter:blur(10px); border:1px solid rgba(139,92,246,0.3); border-radius:20px; padding:1.5rem; }
        .stat-card { background:rgba(20,20,35,0.6); backdrop-filter:blur(10px); border:1px solid rgba(139,92,246,0.3); border-radius:20px; padding:1.5rem; text-align:center; }
        .table-dark-custom { background:rgba(0,0,0,0.3); border-radius:15px; overflow:hidden; }
        .table-dark-custom th { background:rgba(139,92,246,0.3); color:white; }
        .table-dark-custom td { color:#ccc; }
        .btn-neon { background:linear-gradient(135deg, #8b5cf6, #22d3ee); border:none; color:#0b0f19; font-weight:700; border-radius:20px; padding:0.3rem 1rem; }
        .btn-neon-pink { background:linear-gradient(135deg, #8b5cf6, #f472b6); border:none; color:white; font-weight:700; border-radius:20px; padding:0.3rem 1rem; }
        .google-btn { background:white; color:#444; border:none; border-radius:30px; padding:0.4rem 1.2rem; font-weight:600; font-size:0.9rem; display:inline-flex; align-items:center; gap:8px; transition:0.2s; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .google-btn:hover { background:#f1f1f1; }
        .modal-content { background:rgba(15,15,30,0.95); backdrop-filter:blur(25px); border:1px solid var(--violet); border-radius:30px; }
        .modal-header { border-bottom:1px solid rgba(139,92,246,0.4); background:linear-gradient(135deg, #2d1b4e, #1a1a3e); border-radius:30px 30px 0 0; }
        .form-dark { background:rgba(0,0,0,0.5); border:1px solid rgba(139,92,246,0.5); color:white; border-radius:15px; padding:0.7rem 1.2rem; }
        .form-dark:focus { border-color:var(--cyan); box-shadow:0 0 15px rgba(34,211,238,0.4); outline:none; }
        /* تحسينات الجوال */
        @media (max-width: 768px) {
            .sidebar { min-height: auto; padding:0.5rem; }
            .sidebar a { padding:8px 10px; font-size:0.9rem; }
            .stat-card { margin-bottom:1rem; }
        }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center flex-wrap">
            <a class="navbar-brand" href="#" style="font-weight:800; font-size:1.5rem; background:linear-gradient(135deg, #c084fc, #67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
                <i class="fas fa-shield-alt me-2"></i>لوحة تحكم <span style="color:#c084fc;">AYA</span>
            </a>
            <div class="d-flex align-items-center gap-3 mt-1 mt-md-0">
                <button class="google-btn" id="googleSignInBtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> تسجيل الدخول</button>
                <span class="text-muted"><i class="fas fa-user-circle me-1"></i> {{ session.get('name', 'Admin') }}</span>
                <a href="/logout" class="btn-neon-pink"><i class="fas fa-sign-out-alt me-1"></i> خروج</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <a class="nav-link active" onclick="loadSection('dashboard')"><i class="fas fa-tachometer-alt"></i> الرئيسية</a>
                <a class="nav-link" onclick="loadSection('appointments')"><i class="fas fa-calendar-check"></i> المواعيد</a>
                <a class="nav-link" onclick="loadSection('reports')"><i class="fas fa-file-medical-alt"></i> التقارير</a>
                <a class="nav-link" onclick="loadSection('patients')"><i class="fas fa-users"></i> المرضى</a>
                <a class="nav-link" onclick="loadSection('doctors')"><i class="fas fa-user-md"></i> الأطباء</a>
                <a class="nav-link" onclick="loadSection('files')"><i class="fas fa-folder-open"></i> الملفات</a>
                <a class="nav-link" onclick="loadSection('settings')"><i class="fas fa-cog"></i> الإعدادات</a>
            </div>

            <div class="col-md-10 p-4" id="mainContent"></div>
        </div>
    </div>

    <!-- مودال إضافة طبيب -->
    <div class="modal fade" id="addDoctorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white">إضافة طبيب جديد</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form method="POST" action="/admin/add_doctor">
                        <div class="mb-3"><input type="text" name="name" class="form-dark w-100" placeholder="اسم الطبيب الكامل" required></div>
                        <div class="mb-3"><select name="specialty" class="form-dark w-100" required><option>جلدية</option><option>عظمية</option><option>قلبية</option><option>أسنان</option></select></div>
                        <div class="mb-3"><input type="email" name="email" class="form-dark w-100" placeholder="البريد الإلكتروني" required></div>
                        <div class="mb-3"><input type="text" name="phone" class="form-dark w-100" placeholder="رقم الهاتف"></div>
                        <div class="mb-3"><input type="text" name="whatsapp" class="form-dark w-100" placeholder="رقم الواتساب"></div>
                        <div class="mb-3"><input type="text" name="username" class="form-dark w-100" placeholder="اسم المستخدم" required></div>
                        <div class="mb-3"><input type="password" name="password" class="form-dark w-100" placeholder="كلمة المرور" required></div>
                        <button type="submit" class="btn-neon w-100">إضافة الطبيب</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const todayApps = {{ today_apps }};
        const pending = {{ pending }};
        const completed = {{ completed }};
        const totalPatients = {{ total_patients }};
        const appointments = {{ appointments | tojson }};
        const reports = {{ reports | tojson }};
        const doctors = {{ doctors | tojson }};
        const settings = {{ settings | tojson }};
        const uploadedFiles = {{ uploaded_files | tojson }};

        function loadSection(section) {
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            event.target.closest('a').classList.add('active');
            const main = document.getElementById('mainContent');
            switch(section) {
                case 'dashboard': main.innerHTML = renderDashboard(); break;
                case 'appointments': main.innerHTML = renderAppointments(); break;
                case 'reports': main.innerHTML = renderReports(); break;
                case 'patients': main.innerHTML = renderPatients(); break;
                case 'doctors': main.innerHTML = renderDoctors(); break;
                case 'files': main.innerHTML = renderFiles(); break;
                case 'settings': main.innerHTML = renderSettings(); break;
            }
        }

        function renderDashboard() {
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-chart-pie me-2"></i>نظرة عامة</h4>
                <div class="row g-4 mb-4">
                    <div class="col-md-3 col-sm-6"><div class="stat-card"><i class="fas fa-calendar-plus"></i><h3>${todayApps}</h3><p class="text-muted small">مواعيد اليوم</p></div></div>
                    <div class="col-md-3 col-sm-6"><div class="stat-card"><i class="fas fa-clock"></i><h3>${pending}</h3><p class="text-muted small">قيد الانتظار</p></div></div>
                    <div class="col-md-3 col-sm-6"><div class="stat-card"><i class="fas fa-check-circle"></i><h3>${completed}</h3><p class="text-muted small">مكتملة</p></div></div>
                    <div class="col-md-3 col-sm-6"><div class="stat-card"><i class="fas fa-user-injured"></i><h3>${totalPatients}</h3><p class="text-muted small">إجمالي المرضى</p></div></div>
                </div>
            `;
        }

        function renderAppointments() {
            let rows = appointments.map(a => `
                <tr>
                    <td>${a[0]}</td><td>${a[1]}</td><td>${a[2]}</td><td>${a[3]}</td><td>${a[4]}</td><td>${a[5]}</td>
                    <td><span class="badge bg-${a[6]=='pending'?'warning':a[6]=='approved'?'success':'secondary'}">${a[6]}</span></td>
                    <td>${a[6]=='pending' ? `<a href="/admin/approve/${a[0]}" class="btn-neon">موافقة</a>` : `<button class="btn-neon">عرض</button>`}</td>
                </tr>
            `).join('');
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-calendar-check me-2"></i>جميع المواعيد</h4>
                <div class="glass-card"><div class="table-dark-custom"><table class="table table-borderless"><thead><tr><th>#</th><th>المريض</th><th>البريد</th><th>الهاتف</th><th>الطبيب</th><th>التاريخ</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>${rows}</tbody></table></div></div>
            `;
        }

        function renderReports() {
            let rows = reports.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[7]}</td></tr>`).join('');
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-file-medical-alt me-2"></i>التقارير الطبية</h4>
                <div class="glass-card"><div class="table-dark-custom"><table class="table table-borderless"><thead><tr><th>#</th><th>المريض</th><th>البريد</th><th>التخصص</th><th>الوصف</th><th>التاريخ</th></tr></thead><tbody>${rows}</tbody></table></div></div>
            `;
        }

        function renderPatients() {
            return `<h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-users me-2"></i>المرضى</h4><div class="glass-card">قائمة المرضى (قيد التطوير)</div>`;
        }

        function renderDoctors() {
            let rows = doctors.map(d => `<tr><td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td><td>${d[3]}</td><td>${d[4]||'---'}</td><td>${d[5]||'---'}</td><td><button class="btn-neon-pink">حذف</button></td></tr>`).join('');
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-user-md me-2"></i>الأطباء</h4>
                <button class="btn-neon mb-3" data-bs-toggle="modal" data-bs-target="#addDoctorModal"><i class="fas fa-plus me-1"></i> إضافة طبيب</button>
                <div class="glass-card"><div class="table-dark-custom"><table class="table table-borderless"><thead><tr><th>#</th><th>الاسم</th><th>التخصص</th><th>البريد</th><th>الهاتف</th><th>واتساب</th><th>إجراء</th></tr></thead><tbody>${rows}</tbody></table></div></div>
            `;
        }

        function renderFiles() {
            let fileRows = uploadedFiles.map(f => `<tr><td>${f}</td><td><a href="/uploads/${f}" class="btn-neon btn-sm">تنزيل</a></td></tr>`).join('');
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-folder-open me-2"></i>الملفات الطبية المرفوعة</h4>
                <div class="glass-card mb-4">
                    <h5 class="mb-3" style="color:var(--cyan);">رفع ملف جديد (TXT فقط)</h5>
                    <form method="POST" action="/admin/upload" enctype="multipart/form-data">
                        <div class="mb-3"><input type="file" name="file" class="form-dark w-100" accept=".txt" required></div>
                        <button type="submit" class="btn-neon">رفع</button>
                    </form>
                </div>
                <div class="glass-card">
                    <h5 class="mb-3" style="color:var(--pink);">الملفات الحالية</h5>
                    ${uploadedFiles.length ? `<div class="table-dark-custom"><table class="table table-borderless"><thead><tr><th>اسم الملف</th><th>تنزيل</th></tr></thead><tbody>${fileRows}</tbody></table></div>` : '<p class="text-muted">لا توجد ملفات مرفوعة.</p>'}
                </div>
                <div class="mt-3">
                    <a href="/admin/download_sample" class="btn-neon"><i class="fas fa-download me-1"></i> تحميل ملف عينة</a>
                </div>
            `;
        }

        function renderSettings() {
            return `
                <h4 class="mb-4 fw-bold" style="color:#c084fc;"><i class="fas fa-cog me-2"></i>الإعدادات</h4>
                <div class="glass-card">
                    <form method="POST" action="/admin/settings">
                        <h5 class="mb-3" style="color:var(--cyan);">Google API</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><input type="text" name="google_client_id" class="form-dark w-100" placeholder="Client ID" value="${settings.google_client_id || ''}"></div>
                            <div class="col-md-6"><input type="text" name="google_client_secret" class="form-dark w-100" placeholder="Client Secret" value="${settings.google_client_secret || ''}"></div>
                        </div>
                        <h5 class="mb-3" style="color:var(--pink);">البريد الإلكتروني</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><input type="text" name="smtp_server" class="form-dark w-100" placeholder="SMTP Server" value="${settings.smtp_server || ''}"></div>
                            <div class="col-md-6"><input type="text" name="smtp_port" class="form-dark w-100" placeholder="Port" value="${settings.smtp_port || ''}"></div>
                            <div class="col-md-6"><input type="email" name="smtp_email" class="form-dark w-100" placeholder="البريد الإلكتروني" value="${settings.smtp_email || ''}"></div>
                            <div class="col-md-6"><input type="password" name="smtp_password" class="form-dark w-100" placeholder="كلمة المرور" value="${settings.smtp_password || ''}"></div>
                        </div>
                        <h5 class="mb-3" style="color:var(--violet);">التواصل</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><input type="text" name="whatsapp_number" class="form-dark w-100" placeholder="رقم الواتساب" value="${settings.whatsapp_number || ''}"></div>
                        </div>
                        <button type="submit" class="btn-neon">حفظ الإعدادات</button>
                    </form>
                </div>
            `;
        }

        window.onload = () => loadSection('dashboard');
    </script>
</body>
</html>
