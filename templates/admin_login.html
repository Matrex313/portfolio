<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>دخول الإدارة - AYA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background:radial-gradient(ellipse at 50% 50%, #131a2c 0%, #0b0f19 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:rgba(15,15,30,0.9); backdrop-filter:blur(20px); border:1px solid rgba(139,92,246,0.5); border-radius:30px; padding:3rem; box-shadow:0 0 40px rgba(139,92,246,0.4); width:100%; max-width:400px; margin:1rem; }
        .form-control { background:rgba(0,0,0,0.5); border:1px solid rgba(139,92,246,0.5); color:white; border-radius:15px; padding:0.7rem 1.2rem; }
        .form-control:focus { border-color:#22d3ee; box-shadow:0 0 15px rgba(34,211,238,0.4); }
        .btn-login { background:linear-gradient(135deg, #8b5cf6, #22d3ee); border:none; color:#0b0f19; font-weight:800; border-radius:25px; padding:0.8rem; }
        .btn-login:hover { background:linear-gradient(135deg, #f472b6, #8b5cf6); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="mb-4" style="color:#c084fc;"><i class="fas fa-shield-alt me-2"></i>لوحة تحكم AYA</h3>
        <form method="POST">
            <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="اسم المستخدم" required></div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="كلمة المرور" required></div>
            <button type="submit" class="btn-login w-100">دخول</button>
        </form>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger mt-3">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
